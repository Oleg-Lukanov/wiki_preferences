services:
  playwright:
    build: .
    environment:
      - WIKI_BOTPASSWORD_NAME=${WIKI_BOTPASSWORD_NAME}
      - WIKI_BOTPASSWORD_PASSWORD=${WIKI_BOTPASSWORD_PASSWORD}
      - CI=true
    volumes:
      # Mount local directory so the HTML report is available on the host after the run
      - ./playwright-report:/app/playwright-report
