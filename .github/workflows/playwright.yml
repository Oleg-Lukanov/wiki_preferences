name: Playwright Tests

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; cancel in-progress runs on new push
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test:
    name: Run Playwright Tests
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-noble
    env:
      WIKI_USERNAME: ${{ secrets.WIKI_USERNAME }}
      WIKI_PASSWORD: ${{ secrets.WIKI_PASSWORD }}
      CI: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node dependencies
        run: npm ci

      - name: Run Playwright tests
        run: npx playwright test --reporter=html
        # Tests run in the container which already has Chromium installed

      - name: Upload report artifact
        uses: actions/upload-pages-artifact@v3
        # Upload even when tests fail so the report is always available
        if: always()
        with:
          path: playwright-report/

  deploy:
    name: Deploy Report to GitHub Pages
    needs: test
    runs-on: ubuntu-latest
    if: always()
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
